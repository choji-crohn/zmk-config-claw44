# Uncomment the following lines to enable the Claw44 RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=200
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=20
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=10
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=1
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=50
CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Claw44 OLED Display
# CONFIG_ZMK_DISPLAY=y

CONFIG_ZMK_POINTING=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_PM_SOFT_OFF=y

CONFIG_INDICATOR_LED_WIDGET=y

CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=256

# RGB LEDが外部電源（Ext Power）を遮断したときに一緒に消灯するように紐付け
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y